<script>
const toggleBtn = document.getElementById('ai-toggle-btn');
const widget = document.getElementById('ai-widget');
const closeBtn = document.getElementById('close-widget');
const sendBtn = document.getElementById('ai-send-btn');
const userInput = document.getElementById('ai-user-input');
const messages = document.getElementById('ai-messages');

// Toggle widget
toggleBtn.addEventListener('click', () => widget.style.display = 'flex');
closeBtn.addEventListener('click', () => widget.style.display = 'none');

// Send message
sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });

async function sendMessage() {
  const text = userInput.value.trim();
  if(!text) return;
  
  // Add user message
  const userMsg = document.createElement('p');
  userMsg.classList.add('user-msg');
  userMsg.textContent = text;
  messages.appendChild(userMsg);
  messages.scrollTop = messages.scrollHeight;
  userInput.value = '';

  // Show "typing..." indicator
  const typingMsg = document.createElement('p');
  typingMsg.classList.add('ai-msg');
  typingMsg.textContent = 'Typing...';
  messages.appendChild(typingMsg);
  messages.scrollTop = messages.scrollHeight;

  // Call backend (replace '/api/ai-chat' with your endpoint)
  try {
   const response = await fetch('http://localhost:3000/api/ai-chat', { // defna.netlify.app
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ message: text })
});

    const data = await response.json();
    typingMsg.textContent = data.reply || "Sorry, I couldn't understand that.";
    messages.scrollTop = messages.scrollHeight;
  } catch(err) {
    typingMsg.textContent = "Error connecting to AI.";
  }
}
</script>
