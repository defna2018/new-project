<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  color:#fff;
  font-family:'Montserrat', sans-serif;
  overflow-x:hidden;
}

/* =========================
   CONTACT SECTION
========================= */

.contact{
  background:
  linear-gradient(rgba(0,0,0,0.70),
  rgba(0,0,0,0.70)),
  url(/section/image/pexels-koolshooters-7346608.jpg)
  center/cover no-repeat;

  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:80px 20px;
}

.contact-container{
  width:100%;
  max-width:1200px;
  text-align:center;

  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================
   TITLE
========================= */

.contact-subtitle{
  color:#c7a76d;
  letter-spacing:4px;
  text-transform:uppercase;
  font-size:12px;
  margin-bottom:18px;
}

.contact h2{
  font-family:'Playfair Display', serif;
  font-size:60px;
  font-weight:700;
  letter-spacing:3px;
  margin-bottom:20px;
}

.divider{
  width:80px;
  height:2px;
  background:#c7a76d;
  margin:0 auto 30px;
}

.contact-intro{
  color:#d4d4d4;
  font-size:17px;
  margin-bottom:60px;
}

/* =========================
   CONTACT CARDS
========================= */

.contact-cards{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  margin-bottom:60px;
}

.card{
  width:280px;
  padding:35px 25px;

  background:rgba(255,255,255,0.05);

  backdrop-filter:blur(10px);

  border:1px solid rgba(199,167,109,0.15);

  border-radius:20px;

  transition:0.4s ease;
}

.card:hover{
  transform:translateY(-8px);

  border-color:#c7a76d;

  box-shadow:
  0 0 30px rgba(199,167,109,0.25);
}

.icon{
  font-size:38px;
  color:#c7a76d;
  margin-bottom:20px;
}

.card h3{
  font-size:22px;
  margin-bottom:15px;
  color:#fff;
}

.card a{
  color:#d0d0d0;
  text-decoration:none;
  font-size:15px;
}

.card a:hover{
  color:#c7a76d;
}

/* =========================
   FORM
========================= */

.contact-form{
  max-width:800px;
  margin:auto;

  background:rgba(255,255,255,0.05);

  backdrop-filter:blur(10px);

  border:1px solid rgba(199,167,109,0.15);

  padding:40px;
  border-radius:25px;
}

.form-row{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.input-group{
  width:100%;
  text-align:left;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  color:#c7a76d;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
}

input,
textarea{
  width:100%;
  padding:15px;

  background:#111;
  border:1px solid rgba(199,167,109,0.2);

  border-radius:10px;

  color:#fff;
  font-size:15px;
}

textarea{
  min-height:180px;
  resize:none;
}

input:focus,
textarea:focus{
  outline:none;

  border-color:#c7a76d;

  box-shadow:
  0 0 15px rgba(199,167,109,0.4);
}

/* =========================
   BUTTON
========================= */

button{
  width:100%;
  margin-top:20px;

  padding:16px;

  border:none;
  border-radius:10px;

  background:linear-gradient(
  135deg,
  #c7a76d,
  #f0d28a
  );

  color:#111;

  font-weight:600;
  letter-spacing:1px;

  cursor:pointer;

  transition:0.4s ease;
}

button:hover{
  transform:translateY(-3px);

  box-shadow:
  0 0 25px rgba(199,167,109,0.5);
}

/* =========================
   SOCIALS
========================= */

.socials{
  margin-top:50px;
}

.socials p{
  color:#c7a76d;
  margin-bottom:20px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-size:13px;
}

.social-links{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.social-links a{
  width:50px;
  height:50px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,0.05);

  border:1px solid rgba(199,167,109,0.2);

  color:#c7a76d;

  text-decoration:none;
  font-size:18px;

  transition:0.4s ease;
}

.social-links a:hover{
  background:#c7a76d;
  color:#111;

  transform:translateY(-5px);
}

/* =========================
   BACK BUTTON
========================= */

.back-wrapper{
  margin-top:60px;
}

.btn-back{
  display:inline-block;

  padding:14px 30px;

  border:1px solid #c7a76d;

  color:#c7a76d;

  text-decoration:none;

  letter-spacing:2px;
  text-transform:uppercase;

  font-size:13px;

  transition:0.4s ease;
}

.btn-back:hover{
  background:#c7a76d;
  color:#111;
}

/* =========================
   WHATSAPP
========================= */

.whatsapp-btn{
  position:fixed;

  bottom:25px;
  right:25px;

  width:65px;
  height:65px;

  border-radius:50%;

  background:#25D366;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#fff;
  font-size:30px;

  text-decoration:none;

  box-shadow:
  0 0 20px rgba(0,0,0,0.5);

  z-index:1000;

  transition:0.4s ease;
}

.whatsapp-btn:hover{
  transform:scale(1.1);
}

/* =========================
   FOOTER
========================= */

.footer{
  background:#000;
  padding:25px;
  text-align:center;

  color:#888;

  border-top:
  1px solid rgba(199,167,109,0.1);
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

  .contact h2{
    font-size:42px;
  }

  .form-row{
    flex-direction:column;
  }

  .contact-form{
    padding:25px;
  }

  .card{
    width:100%;
  }

}

</style>
