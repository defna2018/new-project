    <script>
function filterItems(category) {
  const items = document.querySelectorAll('.gallery-item');

  items.forEach(item => {
    if (category === 'all') {
      item.style.display = 'block';
    } else {
      item.style.display = item.classList.contains(category) ? 'block' : 'none';
    }
  });
}
</script>

<style>
 @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap');

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  background: #1b1b1b;
  font-family: 'Poppins', sans-serif;
  color: #fff;
}

/* GALLERY SECTION */
.gallery {
  padding: 60px 8%;
}

/* HEADER */
.gallery-header {
  text-align: center;
  margin-bottom: 50px;
}

.gallery-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  letter-spacing: 1px;
}

.subtitle {
  display: block;
  margin-top: 10px;
  font-size: 13px;
  color: #c7a76d;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* CATEGORY BUTTONS */
.category-buttons {
  text-align: center;
  margin-bottom: 40px;
}

.category-buttons button {
  background: transparent;
  border: 1px solid #c7a76d;
  color: #c7a76d;
  padding: 10px 20px;
  margin: 6px;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.category-buttons button:hover {
  background: #c7a76d;
  color: #1b1b1b;
}

/* GRID */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 10px;
}

/* ITEM CARD */
.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  background: #111;
  cursor: pointer;
}

/* IMAGE */
.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}

/* OVERLAY */
.gallery-item::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.7),
    rgba(0,0,0,0)
  );
  opacity: 0;
  transition: 0.4s ease;
}

/* HOVER EFFECT */
.gallery-item:hover img {
  transform: scale(1.08);
}

.gallery-item:hover::after {
  opacity: 1;
}

/* PRODUCT INFO */
.item-info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  transform: translateY(100%);
  transition: 0.4s ease;
}

.gallery-item:hover .item-info {
  transform: translateY(0);
}

.item-info h4 {
  font-size: 15px;
  margin-bottom: 5px;
}

.price {
  color: #c7a76d;
  font-weight: bold;
  font-size: 14px;
}

/* BACK BUTTON */
.back-wrapper {
  text-align: center;
  margin-top: 60px;
}

.btn.back {
  padding: 12px 30px;
  border: 1px solid #c7a76d;
  color: #c7a76d;
  text-decoration: none;
  letter-spacing: 1px;
  font-size: 14px;
  transition: all 0.4s ease;
}

.btn.back:hover {
  background: #c7a76d;
  color: #1b1b1b;
}

/* SCROLLBAR (Luxury Touch) */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-thumb {
  background: #c7a76d;
  border-radius: 10px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .gallery-header h2 {
    font-size: 30px;
  }

  .category-buttons button {
    padding: 8px 14px;
    font-size: 12px;
  }
}
.back-wrapper {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
}

.btn.back {
  padding: 10px 20px;
  border-radius: 50px;
  background: #1b1b1b;
  border: 1px solid #c7a76d;
}
</style>
